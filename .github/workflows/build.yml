name: Repackage Companion APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  repackage:
    name: Change Package Name & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y apktool zipalign apksigner default-jdk aapt

      - name: Verify companion.apk exists
        run: |
          if [ ! -f companion.apk ]; then
            echo "[X] companion.apk not found"
            exit 1
          fi
          echo "[OK] companion.apk found ($(du -h companion.apk | cut -f1))"

      - name: Run repackage script
        run: python3 repackage_companion.py

      - name: Upload repackaged APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: companion-repackaged
          path: companion_repackaged.apk
          retention-days: 7
          overwrite: true

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build_error.log
          retention-days: 7
          overwrite: true
