name: Repackage Companion APK

on:
  workflow_dispatch:
    inputs:
      old_pkg:
        description: 'Current package name in companion APK'
        required: true
      new_pkg:
        description: 'New package name'
        required: true

jobs:
  repackage:
    name: Change Package Name & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y apktool zipalign apksigner default-jdk

      - name: Verify companion.apk exists
        run: |
          if [ ! -f companion.apk ]; then
            echo "[X] companion.apk not found"
            exit 1
          fi
          echo "[OK] companion.apk found ($(du -h companion.apk | cut -f1))"

      - name: Run repackage script
        run: |
          sed -i "s|OLD_PKG  = .*|OLD_PKG  = \"${{ github.event.inputs.old_pkg }}\"|" repackage_companion.py
          sed -i "s|NEW_PKG  = .*|NEW_PKG  = \"${{ github.event.inputs.new_pkg }}\"|" repackage_companion.py
          python3 repackage_companion.py

      - name: Upload repackaged APK
        uses: actions/upload-artifact@v4
        with:
          name: companion-repackaged
          path: companion_repackaged.apk
          retention-days: 7
          overwrite: true
